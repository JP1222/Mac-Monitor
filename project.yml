# XcodeGen project spec — source of truth for MacMonitor.xcodeproj.
#
# Why XcodeGen: a multi-target macOS project (menu bar app + WidgetKit
# extension + shared sources) generates a 2000-line pbxproj that is unreadable
# and merge-hostile. Defining the project in YAML keeps the actual structure
# diff-friendly and makes it trivial to add targets later (notch companion,
# helper agent, share extension).
#
# Bootstrap once on a fresh checkout:
#   brew install xcodegen
#   xcodegen generate
#   open MacMonitor.xcodeproj
#
# The generated .xcodeproj is gitignored on purpose — regenerate, don't edit.

name: MacMonitor
options:
  bundleIdPrefix: com.jp1222
  deploymentTarget:
    macOS: "14.0"  # Sonoma — required for desktop widgets + MenuBarExtra.window style
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "73W26RY42S"  # JP1222's personal team (843072690@qq.com)
    SWIFT_STRICT_CONCURRENCY: minimal
    GENERATE_INFOPLIST_FILE: YES
    # Modern Xcode reads version from build settings, not Info.plist. Both
    # targets MUST use the same values or the widget extension is rejected
    # at registration time ("CFBundleVersion of an app extension must match
    # that of its containing parent app").
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

# Shared sources are compiled into BOTH targets directly (single-source-of-truth
# without a separate framework). For a bigger project we'd promote Shared/ to a
# Swift Package; at this scale duplicating compilation is simpler and avoids the
# embed/sign dance widget extensions require for embedded frameworks.
targets:
  MacMonitor:
    type: application
    platform: macOS
    sources:
      - path: MacMonitor
      - path: Shared
    resources:
      - path: MacMonitor/Assets.xcassets
        optional: true
    info:
      path: MacMonitor/Info.plist
      properties:
        LSUIElement: true            # menu bar app: no Dock icon, no menu bar of its own
        NSHumanReadableCopyright: "© 2026 JP — Yolo Runner Monitor"
        CFBundleDisplayName: "Mac Monitor"
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jp1222.macmonitor
        CODE_SIGN_ENTITLEMENTS: MacMonitor/MacMonitor.entitlements
        # NO sandbox: the app registers the bundled non-sandboxed agent via
        # SMAppService, which macOS forbids from a sandboxed host (anti-escape).
        # See MacMonitor.entitlements for the full rationale. Widget stays sandboxed.
        ENABLE_APP_SANDBOX: NO
        COMBINE_HIDPI_IMAGES: YES
    dependencies:
      - target: MacMonitorWidgets
      # Bundle the local-health agent INSIDE the app and copy it to
      # Contents/MacOS/macmonitor-agent. `link: false` — it's a standalone
      # executable, not a library to link. SMAppService (AgentInstaller)
      # registers it on launch; the agent-bundle.plist below points at this
      # exact path via BundleProgram.
      - target: MacMonitorAgent
        link: false
        copy:
          destination: executables
    postCompileScripts:
      - name: Embed agent LaunchAgent plist
        # SMAppService.agent(plistName:) requires the launchd plist at
        # <app>/Contents/Library/LaunchAgents/<plistName>. XcodeGen has no
        # first-class copy-to-LaunchAgents, so drop it in by hand. Runs before
        # the final code-sign, so the plist is sealed into the bundle.
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          LA_DIR="${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Library/LaunchAgents"
          mkdir -p "$LA_DIR"
          cp "${SRCROOT}/MacMonitorAgent/launchd/agent-bundle.plist" \
             "$LA_DIR/com.jp1222.macmonitor-agent.plist"

  MacMonitorWidgets:
    type: app-extension
    platform: macOS
    sources:
      - path: MacMonitorWidgets
      - path: Shared
    info:
      path: MacMonitorWidgets/Info.plist
      properties:
        CFBundleDisplayName: "Mac Monitor Widgets"
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jp1222.macmonitor.widgets
        CODE_SIGN_ENTITLEMENTS: MacMonitorWidgets/MacMonitorWidgets.entitlements
        ENABLE_APP_SANDBOX: YES
        SKIP_INSTALL: YES

  # Local-health daemon, embedded in the app and registered via SMAppService
  # (see AgentInstaller). The SAME sources also build standalone as a SwiftPM
  # executable (MacMonitorAgent/Package.swift) for install on remote build-farm
  # Macs — one source tree, two build systems.
  MacMonitorAgent:
    type: tool
    platform: macOS
    sources:
      - path: MacMonitorAgent/Sources/MacMonitorAgent
    settings:
      base:
        PRODUCT_NAME: macmonitor-agent
        PRODUCT_BUNDLE_IDENTIFIER: com.jp1222.macmonitor-agent
        # NO app sandbox: the agent shells out to docker / du / pgrep /
        # launchctl, all of which the sandbox forbids. Hardened runtime stays
        # ON (inherited from base) — it spawns those as subprocesses rather
        # than loading their libraries, so library validation never trips, and
        # SMAppService can still verify the signature against the host app.
        ENABLE_APP_SANDBOX: NO
        SKIP_INSTALL: YES
